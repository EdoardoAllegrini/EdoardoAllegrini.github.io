    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top" id="navbar">

                        <a class="nav-link" href="./passions.html">Passions</a>
                    </li>
                </ul>
            </div>
        </div>

    <main role="main">

        <!-- Main jumbotron for a primary marketing message or call to action -->
        <div class="container">
            <input type="radio" name="slider" id="item-1" checked>
            <input type="radio" name="slider" id="item-2">
            <input type="radio" name="slider" id="item-3">
            <div class="cards">
                <label class="card" for="item-1" id="song-1">
                    <img src="../images/basket.jpg">
                </label>
                <label class="card" for="item-2" id="song-2">
                    <img src="../images/tennis.jpg">
                </label>
                <label class="card" for="item-3" id="song-3">
                    <img src="../images/chess.jpg">
                </label>
            </div>
            <div class="player">
                <div class="upper-part">
                    <div class="info-area" id="test">
                        <label class="info" id="info-1" style="display: block;">
                            <div class="title">Basketball</div>
                            <p>
                                I've started playing basketball at the age of 13 y.o, as soon as me and my team learnt
                                how to hoop we decided to join a tournament in Rome and provinces.
                                I never stopped watching NBA on tv and playing basketball with my friends.
                            </p>
                    </div>
                    </label>
                    <label class="info" id="info-2">
                        <div class="title">Tennis</div>
                        <div class="sub-line">
                            <p>
                                Since that I'm curious person after four years of playing basket I decided to begin
                                practicing a new sport, tennis.
                                After just two years of playing tennis my coach noticed the determination that I was
                                demonstrating on the court mixed to the talent and proposed me to have an experience
                                during the summer
                                at the <a href="https://emiliosanchezacademy.com/" target="_blank"
                                    rel="noopener noreferrer" id="link">Emilio Sánchez Academy</a>, a famous
                                professional tennis academy in Barcelona.
                                <br>
                                I took that opportunity and I'm still playing at a competitive tennis level.
                            </p>
                        </div>
                    </label>
                    <label class="info" id="info-3">
                        <div class="title">Chess</div>
                        <div class="sub-line">
                            <p>
                                I used to play chess with my parents since I was a child, but I started studying it in
                                2020. In two years I played a bunch of matches almost every day on the website <a
                                    href="https://chess.com/" target="_blank" rel="noopener noreferrer"
                                    id="link">Chess.com</a>. If you want to play you can hit me up in the contacts section.
                            </p>
                        </div>
                    </label>
                </div>
            </div>
        </div>
        </div>


    </main>
