<html>

<head>

  <title>Instagram</title>
  <link rel="shortcut icon" href="https://www.instagram.com/static/images/ico/favicon.ico/36b3ee2d91ed.ico" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <span id="root">
    <section class="section-all">

      <!-- 1-Role Main -->
      <main class="main" role="main">
        <div class="wrapper">
          <article class="article">
            <div class="image-wrapper">
              <img class="iphone" src="https://www.instagram.com/static/images/homepage/home-phones.png/43cc71bb1b43.png" alt="">
              <div class="images" id="images">
                <img alt="" class="RP4i1  UVauz"
                  src="https://www.instagram.com/static/images/homepage/screenshot1.jpg/d6bf0c928b5a.jpg">
                <img alt="" class="RP4i1  "
                  src="https://www.instagram.com/static/images/homepage/screenshot2.jpg/6f03eb85463c.jpg">
                <img alt="" class="RP4i1  "
                  src="https://www.instagram.com/static/images/homepage/screenshot3.jpg/f0c687aa6ec2.jpg">
                <img alt="" class="RP4i1  "
                  src="https://www.instagram.com/static/images/homepage/screenshot4.jpg/842fe5699220.jpg"> 
                <img alt="" class="RP4i1  "
                  src="https://www.instagram.com/static/images/homepage/screenshot5.jpg/0a2d3016f375.jpg">
              </div>

            </div>
            <div class="content">
              <div class="login-box">
                <div class="header">
                  <img class="logo"
                    src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png"
                    alt="Instagram">
                </div><!-- Header end -->
                <div class="form-wrap">
                  <form class="form">

                    <div class="input-box">
                      <input type="text" id="name" aria-describedby="" placeholder="Phone number, username, or email"
                        aria-required="true" maxlength="30" autocapitalize="off" autocorrect="off" name="username"
                        value="" required>
                    </div>

                    <div class="input-box">
                      <input type="password" name="password" id="password" placeholder="Password" aria-describedby=""
                        maxlength="30" aria-required="true" autocapitalize="off" autocorrect="off" required>
                    </div>

                    <span class="button-box">
                      <button class="btn" type="submit" name="submit">Log in</button>
                    </span>

                    <a class="forgot" href="https://www.instagram.com/accounts/password/reset/">Forgot password?</a>
                  </form>
                </div> <!-- Form-wrap end -->
              </div> <!-- Login-box end -->

              <div class="login-box">
                <p class="text">Don't have an account?<a href="https://www.instagram.com/accounts/emailsignup/">Sign
                    up</a></p>
              </div> <!-- Signup-box end -->

              <div class="app">
                <p>Get the app.</p>
                <div class="app-img">
                  <a
                    href="https://itunes.apple.com/app/instagram/id389801252?pt=428156&amp;ct=igweb.loginPage.badge&amp;mt=8">
                    <img
                      src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_english-en.png/4b70f6fae447.png">
                  </a>
                  <a
                    href="https://play.google.com/store/apps/details?id=com.instagram.android&amp;referrer=utm_source%3Dinstagramweb%26utm_campaign%3DloginPage%26utm_medium%3Dbadge">
                    <img
                      src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_english-en.png/f06b908907d5.png">
                  </a>
                </div> <!-- App-img end-->
              </div> <!-- App end -->
            </div> <!-- Content end -->

          </article>
        </div> <!-- Wrapper end -->
      </main>

      <!-- 2-Role Footer -->
      <footer class="footer" role="contentinfo">
        <div class="footer-container">

          <nav class="footer-nav" role="navigation">
            <ul>
              <li><a href="https://about.instagram.com/">About Us</a></li>
              <li><a href="">Blog</a></li>
              <li><a href="https://www.instagram.com/about/jobs/">Jobs</a></li>
              <li><a href="">Help</a></li>
              <li><a href="">Api</a></li>
              <li><a href="">Privacy</a></li>
              <li><a href="">Terms</a></li>
              <li><a href="">Top Accounts</a></li>
              <li><a href="">Hashtags</a></li>
              <li><a href="">Locations</a></li>

              <span class="language">Language
                <select name="language" class="select" onchange="la(this.value)">
                  <option value="#">English</option>
                </select>
              </span>
              </li>
            </ul>
          </nav>

          <span class="footer-logo">© 2021 Instagram from Facebook</span>
        </div> <!-- Footer container end -->
      </footer>

    </section>
  </span> <!-- Root -->

  <!-- Select Link -->
  <script type="text/javascript">
    function la(src) {
      window.location = src;
    }
  </script>
  <script src="script.js"></script>
</body>


</html>
